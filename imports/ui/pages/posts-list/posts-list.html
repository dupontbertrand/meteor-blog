<template name="postsListPage">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Posts</h2>
    {{#if isInRole "posts.create"}}
      <a href="/post/new" class="btn btn-primary">+ New Post</a>
    {{/if}}
  </div>

  {{#each post in posts}}
    <div class="card mb-3 post-card {{#if post.hidden}}post-hidden{{/if}}">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h5 class="card-title mb-1">
              <a href="/post/{{post._id}}" class="text-decoration-none">{{post.title}}</a>
            </h5>
            <p class="text-muted small mb-2">
              By {{authorName post.authorId}} &middot; {{formatDate post.createdAt}}
              {{#if post.hidden}}<span class="badge bg-danger ms-1">Hidden</span>{{/if}}
            </p>
          </div>
        </div>
        <p class="card-text text-muted">{{excerpt post.body}}</p>
      </div>
    </div>
  {{else}}
    <div class="text-center text-muted py-5">No posts yet.</div>
  {{/each}}
</template>
